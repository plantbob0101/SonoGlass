name: SonoGlass
options:
  deploymentTarget:
    macOS: "26.0"
    visionOS: "26.0"
  createIntermediateGroups: true

packages:
  SonoGlassCore:
    path: .

targets:
  SonoGlass:
    type: application
    platform: macOS
    scheme: {}
    sources:
      - path: Sources/App
    dependencies:
      - package: SonoGlassCore
        products:
          - SonosKit
          - PandoraKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonoglass.app
        PRODUCT_NAME: SonoGlass
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Resources/SonoGlass-signed.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        DEAD_CODE_STRIPPING: YES
      configs:
        Release:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO

  SonoGlassVision:
    type: application
    platform: visionOS
    scheme: {}
    sources:
      - path: Sources/App
        excludes:
          - "SonoGlassApp.swift"
          - "UI/PopoverView.swift"
          - "UI/NowPlayingSection.swift"
          - "UI/BrowseSections.swift"
          - "UI/MiniPlayer.swift"
          - "UI/SettingsView.swift"
      - path: Sources/VisionApp
      - path: Resources/VisionAssets.xcassets
    dependencies:
      - package: SonoGlassCore
        products:
          - SonosKit
          - PandoraKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonoglass.app
        PRODUCT_NAME: SonoGlassVision
        INFOPLIST_FILE: Resources/Info-vision.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        XROS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "7"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
